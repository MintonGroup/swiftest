# .readthedocs.yaml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

sphinx:
  configuration: docs/conf.py
  fail_on_warning: false  # Optional: Set to true if you want the build to fail on warnings.

build:
  os: ubuntu-26.04
  tools:
    python: "3.13"
  apt_packages:
    - graphviz
    - libxml2-dev
    - libcurl4-openssl-dev
    - libfftw3-dev
    - liblapack-dev
    - libopenblas-dev
    - build-essential
    - cmake
    - ninja-build
    - gfortran-12
    - libopenmpi-dev

  jobs:
    post_create_environment:
      - git fetch --prune --unshallow
      - git fetch --depth=1 origin +refs/tags/*:refs/tags/*
      - bash buildscripts/set_env_and_build_dependencies.sh 
      - NETCDF_FORTRAN_HOME="/home/docs/deps" \
        NETCDF_FORTRAN_DIR="/home/docs/deps/lib/cmake/netCDF" \
        NETCDF_FORTRAN_INCLUDE="/home/docs/deps/include" \
        NFDIR="/home/docs/deps" \
        NETCDF_DIR="/home/docs/deps/lib/cmake/netCDF" \
        NCDIR="/home/docs/deps" \
        HDF5_ROOT="/home/docs/deps" \
        HDF5_DIR="/home/docs/deps/cmake" \
        HDF5_PLUGIN_PATH="/home/docs/deps/lib/plugin" \
        HDF5_INCLUDE_DIR="/home/docs/deps/include" \
        HDF5_LIBDIR="/home/docs/deps/lib" \
        SHTOOLS_HOME="/home/docs/deps" \
        LIBS="-ldl" \
        LDFLAGS="-L/home/docs/deps/lib" \
        LD_LIBRARY_PATH="/home/docs/deps/lib" \
        CPATH="/home/docs/deps/include" \
        CPPFLAGS="-I/home/docs/deps/include" \
        CXXFLAGS="-Wa,--noexecstack -fPIC" \
        CFLAGS="-Wa,--noexecstack -fPIC" \
        FFLAGS="-Wa,--noexecstack -fPIC" \
        FCFLAGS="-Wa,--noexecstack -fPIC" \
        OpenCoarrays_HOME="/home/docs/deps/../../opencoarrays/2.10.2" \
        OpenCoarrays_DIR="/home/docs/deps/../../opencoarrays/2.10.2/lib64/cmake/opencoarrays" \
        pip install -v .
      - ford docs/fortran_docs.md 

python:
  install: 
    - requirements: docs/requirements.txt
